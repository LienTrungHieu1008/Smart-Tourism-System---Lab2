<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Tourism AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Hình khối trang trí làm nền -->
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <!-- Thanh menu điều hướng -->
    <nav class="navbar">
        <div class="logo">🌍 SmartTourism</div>
        <div class="auth-section">
            <button id="loginBtn" class="btn-primary">Đăng nhập Google</button>
            <div id="userInfo" class="user-info hidden">
                <img id="userAvatar" src="" alt="Avatar">
                <span id="userName"></span>
                <button id="logoutBtn" class="btn-secondary">Đăng xuất</button>
            </div>
        </div>
    </nav>

    <!-- Khung kính hiển thị nội dung chính (Glassmorphism) -->
    <main class="container glass-panel">
        <header class="text-center">
            <h1 class="gradient-text">Khám Phá Việt Nam Bằng AI</h1>
            <p class="subtitle">Nhập yêu cầu của bạn, AI sẽ tìm điểm đến lý tưởng nhất</p>
        </header>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="VD: Tôi muốn đi biển xanh cát trắng, có hải sản ngon..." autofocus>
            <button id="searchBtn" class="btn-glow">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                Tìm Kiếm
            </button>
        </div>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <span>AI đang phân tích hàng ngàn điểm đến...</span>
        </div>

        <div id="error" class="alert alert-error hidden"></div>

        <!-- Chứa danh sách kết quả -->
        <div id="results" class="results-grid"></div>
        
        <!-- Chứa lịch sử tìm kiếm -->
        <div id="historySection" class="history-section hidden">
            <h3>🕒 Lịch sử tìm kiếm gần đây</h3>
            <ul id="historyList"></ul>
        </div>
    </main>

    <!-- Thêm thư viện Firebase (CDN) dạng module -->
    <script type="module" src="app.js"></script>
</body>
</html>
